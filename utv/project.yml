name: utv
options:
  bundleIdPrefix: com.utv
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.0"

targets:
  utv:
    type: application
    platform: macOS
    sources:
      - path: utv
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.utv.app
        PRODUCT_NAME: utv
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.entertainment"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_NSMainStoryboardFile: ""
        CODE_SIGN_ENTITLEMENTS: utv/utv.entitlements
        ASSETCATALOG_COMPILER_INCLUDE_ALL_APPICON_ASSETS: YES
      configs:
        debug:
          CODE_SIGN_IDENTITY: "-"
        release:
          CODE_SIGN_IDENTITY: "-"
    entitlements:
      path: utv/utv.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true

  utv-ios:
    type: application
    platform: iOS
    sources:
      - path: utv
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.utv.ios
        PRODUCT_NAME: utv
        SWIFT_VERSION: "5.9"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: YES
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ${DEVELOPMENT_TEAM}

  utv-tv:
    type: application
    platform: tvOS
    sources:
      - path: utv
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.utv.tv
        PRODUCT_NAME: utv
        SWIFT_VERSION: "5.9"
        TVOS_DEPLOYMENT_TARGET: "17.0"
        GENERATE_INFOPLIST_FILE: YES
